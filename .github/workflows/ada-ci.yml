name: ada-ci

on:
  push:
  pull_request:

jobs:
  build-and-prove:
    runs-on: ubuntu-latest
    container:
      image: alire/gnat:community-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for trufflehog
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
      - name: Validate shell scripts
        run: >
          bash -n
          scripts/check_toolchain.sh
          scripts/bootstrap_toolchain.sh
          scripts/run_container_ci.sh
          scripts/build_multiarch_image.sh
          scripts/check_operator_console.sh
          scripts/serve_operator_console.sh
          scripts/check_docker_runtime_bundle.sh
          scripts/check_service_supervisors.sh
          scripts/run_cross_platform_smoke_suite.sh
          scripts/generate_attestation_artifacts.sh
          scripts/verify_supply_chain_artifacts.sh
          scripts/run_competitive_multiarch_benchmarks.sh
          scripts/check_competitive_baseline.sh
          scripts/vulnerability_license_gate.sh
          scripts/release_candidate_gate.sh
          && ./scripts/bootstrap_toolchain.sh --validate
      - name: Build and prove gate
        run: |
          apt-get update -qq && apt-get install -y --no-install-recommends libsqlite3-dev
          ln -sf /usr/lib/x86_64-linux-gnu/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so || true
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          make check
          make config-test
          make context-test
          make tools-test
      - name: Coverage report
        run: |
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          BUILD_PROFILE=coverage make check config-test context-test tools-test || true
          gcov obj/*.gcda 2>/dev/null || true
          lcov --capture --directory obj --output-file coverage.info 2>/dev/null || true
          genhtml coverage.info --output-directory coverage-html 2>/dev/null || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.info
            coverage-html/
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            tests/competitive_benchmark_report.json

  spark-proofs:
    runs-on: ubuntu-latest
    container:
      image: alire/gnat:community-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: SPARK Silver level 2 proofs
        run: |
          apt-get update -qq && apt-get install -y --no-install-recommends libsqlite3-dev
          ln -sf /usr/lib/x86_64-linux-gnu/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so || true
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          make prove

  fuzz-suite:
    needs: spark-proofs
    runs-on: ubuntu-latest
    container:
      image: alire/gnat:community-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Security regression fuzz testing
        run: |
          apt-get update -qq && apt-get install -y --no-install-recommends libsqlite3-dev
          ln -sf /usr/lib/x86_64-linux-gnu/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so || true
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          make fuzz-suite

  integration-test:
    needs: build-and-prove
    runs-on: ubuntu-latest
    container:
      image: alire/gnat:community-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: End-to-end test with mock LLM
        run: |
          apt-get update -qq && apt-get install -y --no-install-recommends libsqlite3-dev
          ln -sf /usr/lib/x86_64-linux-gnu/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so || true
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          make docker-dev-integration-test

  # Warnings-as-errors gate: zero-warning build enforced with -gnatwe.
  warnings-gate:
    runs-on: ubuntu-latest
    container:
      image: alire/gnat:community-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Warnings-as-errors build (-gnatwe)
        run: |
          apt-get update -qq && apt-get install -y --no-install-recommends libsqlite3-dev
          ln -sf /usr/lib/x86_64-linux-gnu/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so || true
          export PATH=/opt/gnat/bin:$PATH
          export GPR_PROJECT_PATH=/opt/gnat/share/gpr
          gprbuild -P vericlaw.gpr -p \
            -cargs -gnat2022 -gnata -gnatVa -gnatwa -gnatyy -gnato -gnatwe 2>&1 \
            | tee warnings-report.txt
          echo "--- Warning count ---"
          grep -c ": warning:" warnings-report.txt || echo "0 warnings"
      - name: Upload warnings report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warnings-report
          path: warnings-report.txt

  # Supply chain attestation: generates SPDX SBOM + provenance JSON, then
  # verifies them. Pure Python — runs without a GNAT container.
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate attestation artifacts (SBOM + provenance)
        run: ./scripts/generate_attestation_artifacts.sh
      - name: Verify supply chain artifacts
        run: ./scripts/verify_supply_chain_artifacts.sh
      - name: Upload supply chain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts
          path: |
            tests/sbom.spdx.json
            tests/provenance_attestation.json
            tests/supply_chain_attestation_report.json
            tests/supply_chain_verification_report.json

  container-ci-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        action: [check, conformance-suite]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Run container CI action
        run: ADA_CONTAINER_PLATFORM=${{ matrix.platform }} ./scripts/run_container_ci.sh ${{ matrix.action }}

  cross-platform-smoke-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Run expanded smoke matrix
        run: SMOKE_FAIL_ON_NON_BLOCKING=true make cross-platform-smoke
      - name: Upload cross-platform smoke report
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-smoke-report
          path: tests/cross_platform_smoke_report.json

  multiarch-image-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64, linux/arm/v7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build platform image
        run: |
          platform="${{ matrix.platform }}"
          tag_suffix="${platform//\//-}"
          IMAGE_TAG="ci-${tag_suffix}" IMAGE_PLATFORMS="${platform}" LOAD_IMAGE=true ./scripts/build_multiarch_image.sh
      - name: Verify trust and provenance metadata
        run: |
          ./scripts/generate_attestation_artifacts.sh
          REQUIRE_TRUST_METADATA=true ./scripts/verify_supply_chain_artifacts.sh
      - name: Validate runtime bundle and service packages
        run: |
          ./scripts/check_docker_runtime_bundle.sh
          ./scripts/check_service_supervisors.sh

  competitive-benchmark-arm-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Run ARM benchmark matrix
        run: ./scripts/run_competitive_multiarch_benchmarks.sh --runs 10 --profile edge-speed
      - name: Upload ARM benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: competitive-benchmark-arm-matrix
          path: |
            tests/competitive_multiarch_benchmark_report.json
            tests/competitive_benchmark_report_linux_arm64.json
            tests/competitive_benchmark_report_linux_arm_v7.json
            tests/competitive_direct_benchmark_report_linux_arm64.json
            tests/competitive_direct_benchmark_report_linux_arm_v7.json

  bridge-audit:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Audit and test bridges
        run: |
          set -euo pipefail
          for dir in mcp-bridge browser-bridge slack-bridge discord-bridge email-bridge irc-bridge matrix-bridge wa-bridge; do
            echo "=== $dir ==="
            cd "$dir"
            npm ci
            npm audit --audit-level=high
            npm test
            cd ..
          done
