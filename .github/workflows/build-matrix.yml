name: Cross-Platform Build

on:
  workflow_call:
    inputs:
      build_profile:
        description: 'Build profile (dev, release)'
        required: false
        default: 'release'
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            triple: x86_64-linux-gnu
          - target: linux-aarch64
            triple: aarch64-linux-gnu
          - target: linux-armv7
            triple: arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsqlite3-dev libcurl4-openssl-dev
          if [ "${{ matrix.triple }}" = "aarch64-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.triple }}" = "arm-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.triple }} ./scripts/embed_version.sh
      - name: Build
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.triple }}
          # Strip debug symbols (keep separate)
          objcopy --only-keep-debug vericlaw vericlaw.debug 2>/dev/null || true
          strip --strip-all vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: |
            vericlaw
            vericlaw.debug

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: macos-aarch64
            arch: arm64
            gpr_target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: brew install sqlite curl
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.gpr_target }} ./scripts/embed_version.sh
      - name: Build
        env:
          LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib:/opt/homebrew/opt/curl/lib
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.gpr_target }}
          strip vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw

  build-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-aarch64, path: arm64/ }
      - uses: actions/download-artifact@v4
        id: dl-x86
        continue-on-error: true
        with: { name: vericlaw-macos-x86_64, path: x86_64/ }
      - name: Create universal binary
        run: |
          if [ -f x86_64/vericlaw ]; then
            chmod +x arm64/vericlaw x86_64/vericlaw
            lipo -create -output vericlaw arm64/vericlaw x86_64/vericlaw
            file vericlaw
          else
            cp arm64/vericlaw vericlaw
            chmod +x vericlaw
            echo "x86_64 unavailable; publishing ARM64 as universal"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-macos-universal
          path: vericlaw

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (curl, sqlite)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-curl
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Generate build info
        shell: bash
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=x86_64-w64-mingw32 ./scripts/embed_version.sh
      - name: Install make shim (aws 24.0.0 Windows workaround)
        # aws 24.0.0 post-fetch: awsres writes to .build/<target>/common/src but
        # gprbuild -p never creates that directory on Windows.  Fix: compile a
        # tiny make.exe wrapper that pre-creates the directory before every make
        # invocation, then place it first in PATH so Alire finds it instead of
        # the real MSYS2 make.exe.
        shell: pwsh
        run: |
          $shimDir = "$env:TEMP\make-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          @'
#include <windows.h>
#include <string.h>
static void mkdirp(const char *p) {
    char b[MAX_PATH]; DWORD i, n = (DWORD)strlen(p);
    for (i = 1; i <= n; i++) {
        if (p[i]=='\\' || p[i]=='/' || i==n) {
            strncpy(b,p,i); b[i]='\0'; CreateDirectoryA(b,NULL);
        }
    }
}
int main(int argc, char **argv) {
    int i; char cmd[32768];
    mkdirp(".build\\x86_64-w64-mingw32\\common\\src");
    strcpy(cmd, "C:\\msys64\\usr\\bin\\make.exe");
    for (i=1;i<argc;i++){strcat(cmd," ");strcat(cmd,argv[i]);}
    STARTUPINFOA si; ZeroMemory(&si,sizeof(si)); si.cb=sizeof(si);
    PROCESS_INFORMATION pi;
    if (!CreateProcessA(NULL,cmd,NULL,NULL,TRUE,0,NULL,NULL,&si,&pi)) return 1;
    WaitForSingleObject(pi.hProcess,INFINITE);
    DWORD ec; GetExitCodeProcess(pi.hProcess,&ec);
    CloseHandle(pi.hProcess); CloseHandle(pi.hThread);
    return (int)ec;
}
'@ | Set-Content "$shimDir\shim.c" -Encoding Ascii
          gcc -o "$shimDir/make.exe" "$shimDir/shim.c" -static-libgcc
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##[warning]make shim compile failed; build may still work without it"
          } else {
            # Prepend shim directory to PATH for subsequent steps
            Add-Content -Path $env:GITHUB_PATH -Value $shimDir
            Write-Host "make shim installed at $shimDir"
          }
      - name: Build
        shell: bash
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=x86_64-w64-mingw32
          strip vericlaw.exe 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-windows-x86_64
          path: vericlaw.exe
