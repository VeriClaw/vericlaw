name: Cross-Platform Build

on:
  workflow_call:
    inputs:
      build_profile:
        description: 'Build profile (dev, release)'
        required: false
        default: 'release'
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            triple: x86_64-linux-gnu
          - target: linux-aarch64
            triple: aarch64-linux-gnu
          - target: linux-armv7
            triple: arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsqlite3-dev libcurl4-openssl-dev
          if [ "${{ matrix.triple }}" = "aarch64-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.triple }}" = "arm-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.triple }} ./scripts/embed_version.sh
      - name: Build
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.triple }}
          # Strip debug symbols (keep separate)
          objcopy --only-keep-debug vericlaw vericlaw.debug 2>/dev/null || true
          strip --strip-all vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: |
            vericlaw
            vericlaw.debug

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: macos-aarch64
            arch: arm64
            gpr_target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: brew install sqlite curl
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.gpr_target }} ./scripts/embed_version.sh
      - name: Build
        env:
          LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib:/opt/homebrew/opt/curl/lib
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.gpr_target }}
          strip vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw

  build-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-aarch64, path: arm64/ }
      - uses: actions/download-artifact@v4
        id: dl-x86
        continue-on-error: true
        with: { name: vericlaw-macos-x86_64, path: x86_64/ }
      - name: Create universal binary
        run: |
          if [ -f x86_64/vericlaw ]; then
            chmod +x arm64/vericlaw x86_64/vericlaw
            lipo -create -output vericlaw arm64/vericlaw x86_64/vericlaw
            file vericlaw
          else
            cp arm64/vericlaw vericlaw
            chmod +x vericlaw
            echo "x86_64 unavailable; publishing ARM64 as universal"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-macos-universal
          path: vericlaw

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (curl, sqlite)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-curl
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Generate build info
        shell: bash
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=x86_64-w64-mingw32 ./scripts/embed_version.sh
      - name: Install make shim (aws 24.0.0 Windows workaround)
        # aws 24.0.0: awsres writes template files to .build/<target>/common/src
        # but gprbuild -p never creates that directory on Windows.  Compile a
        # tiny make.exe wrapper that pre-creates the path before delegating to
        # the real make.  Install it at C:\msys64\usr\bin\make.exe (replacing
        # the original, which is backed up as make-orig.exe) so both MSYS2 bash
        # PATH (/usr/bin) and the Windows PATH pick up the wrapper.
        shell: python
        run: |
          import os, subprocess, shutil
          orig = r'C:\msys64\usr\bin\make.exe'
          bak  = r'C:\msys64\usr\bin\make-orig.exe'
          if os.path.exists(orig) and not os.path.exists(bak):
              shutil.copy2(orig, bak)
              print('Backed up', orig, '->', bak)
          sd = os.path.join(os.environ.get('TEMP', 'C:\\Temp'), 'make-shim')
          os.makedirs(sd, exist_ok=True)
          # Write C source for the shim (raw string avoids Python escape confusion)
          c = r"""
          #include <windows.h>
          #include <string.h>
          static void md(const char *p) {
            char b[MAX_PATH]; DWORD i, n = (DWORD)strlen(p);
            for (i = 1; i <= n; i++)
              if (p[i]=='\\' || p[i]=='/' || i==n) {
                strncpy(b, p, i); b[i] = '\0'; CreateDirectoryA(b, NULL);
              }
          }
          int main(int argc, char **argv) {
            int i; char cmd[32768];
            md(".build\\x86_64-w64-mingw32\\common\\src");
            strcpy(cmd, "C:\\msys64\\usr\\bin\\make-orig.exe");
            for (i = 1; i < argc; i++) { strcat(cmd, " "); strcat(cmd, argv[i]); }
            STARTUPINFOA si; ZeroMemory(&si, sizeof(si)); si.cb = sizeof(si);
            PROCESS_INFORMATION pi;
            if (!CreateProcessA(NULL,cmd,NULL,NULL,TRUE,0,NULL,NULL,&si,&pi)) return 1;
            WaitForSingleObject(pi.hProcess, INFINITE);
            DWORD ec; GetExitCodeProcess(pi.hProcess, &ec);
            CloseHandle(pi.hProcess); CloseHandle(pi.hThread);
            return (int)ec;
          }
          """
          src = os.path.join(sd, 'shim.c')
          with open(src, 'w') as f:
              f.write(c)
          exe = os.path.join(sd, 'make.exe')
          if subprocess.call(['gcc', '-o', exe, src, '-static-libgcc']) == 0:
              shutil.copy2(exe, orig)
              print('make shim installed at', orig, '(orig backed up as', bak, ')')
          else:
              print('Warning: make shim compile failed; proceeding without it')
      - name: Build
        # Use shell: python so subprocess.call never exits on non-zero return
        # codes (unlike bash -e which kills the script before the retry runs).
        shell: python
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          import os, subprocess, sys, glob
          r = subprocess.call(['alr', 'toolchain', '--select', 'gnat_native=14.2.1'])
          if r != 0:
              sys.exit(r)
          # aws 24.0.0 on Windows: awsres cannot create files in
          # .build/<triple>/common/src because the directory does not exist.
          # Run build once; on failure create the missing directory and retry
          # (Alire re-runs post-fetch from the already-compiled state, so only
          # gen-templates re-runs on the second attempt ~30s, not ~4.5 min).
          r = subprocess.call(['alr', 'build', '--',
              '-XBUILD_PROFILE=${{ inputs.build_profile }}',
              '-XBUILD_TARGET=x86_64-w64-mingw32'])
          if r != 0:
              print('First build attempt failed (exit %d). Creating missing aws 24.0.0 directory...' % r)
              la = os.environ.get('LOCALAPPDATA', '')
              dirs = glob.glob(la.replace('\\', '/') + '/alire/cache/builds/aws_24*/*/.build')
              print('Found aws .build dirs:', dirs)
              for d in dirs:
                  target = d + '/x86_64-w64-mingw32/common/src'
                  os.makedirs(target, exist_ok=True)
                  print('Created:', target)
              print('Retrying build...')
              r = subprocess.call(['alr', 'build', '--',
                  '-XBUILD_PROFILE=${{ inputs.build_profile }}',
                  '-XBUILD_TARGET=x86_64-w64-mingw32'])
              if r != 0:
                  sys.exit(r)
          subprocess.call(['strip', 'vericlaw.exe'])
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-windows-x86_64
          path: vericlaw.exe
