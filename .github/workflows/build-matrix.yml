name: Cross-Platform Build

on:
  workflow_call:
    inputs:
      build_profile:
        description: 'Build profile (dev, release)'
        required: false
        default: 'release'
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            triple: x86_64-linux-gnu
          - target: linux-aarch64
            triple: aarch64-linux-gnu
          - target: linux-armv7
            triple: arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsqlite3-dev libcurl4-openssl-dev
          if [ "${{ matrix.triple }}" = "aarch64-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.triple }}" = "arm-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.triple }} ./scripts/embed_version.sh
      - name: Build
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.triple }}
          # Strip debug symbols (keep separate)
          objcopy --only-keep-debug vericlaw vericlaw.debug 2>/dev/null || true
          strip --strip-all vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: |
            vericlaw
            vericlaw.debug

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: macos-aarch64
            arch: arm64
            gpr_target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: brew install sqlite curl
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.gpr_target }} ./scripts/embed_version.sh
      - name: Build
        env:
          LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib:/opt/homebrew/opt/curl/lib
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.gpr_target }}
          strip vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw

  build-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-aarch64, path: arm64/ }
      - uses: actions/download-artifact@v4
        id: dl-x86
        continue-on-error: true
        with: { name: vericlaw-macos-x86_64, path: x86_64/ }
      - name: Create universal binary
        run: |
          if [ -f x86_64/vericlaw ]; then
            chmod +x arm64/vericlaw x86_64/vericlaw
            lipo -create -output vericlaw arm64/vericlaw x86_64/vericlaw
            file vericlaw
          else
            cp arm64/vericlaw vericlaw
            chmod +x vericlaw
            echo "x86_64 unavailable; publishing ARM64 as universal"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-macos-universal
          path: vericlaw

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (curl, sqlite)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-curl
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Generate build info
        shell: bash
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=x86_64-w64-mingw32 ./scripts/embed_version.sh
      - name: Build
        # aws 24.0.0 post-fetch fails on Windows because awsres tries to write
        # template files to .build/<target>/common/src, which gprbuild -p never
        # creates on Windows. Workaround: let the first alr build fail, create
        # the missing directory, then retry. Alire re-runs post-fetch and make
        # skips already-compiled objects, so only the template files are built.
        shell: pwsh
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          alr toolchain --select gnat_native=14.2.1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          alr build -- "-XBUILD_PROFILE=${{ inputs.build_profile }}" "-XBUILD_TARGET=x86_64-w64-mingw32"

          if ($LASTEXITCODE -ne 0) {
            # Create the directory awsres needs. The build-cache path is
            # deterministic for aws 24.0.0 across all runners.
            $awsRoot = "$env:LOCALAPPDATA\alire\cache\builds\aws_24.0.0_2b75fe6d\299aa2aa2b3be3cdf085de35bfc4b68a583b808905cab5fac91b79e80e9cfe0e"
            if (Test-Path $awsRoot) {
              New-Item -ItemType Directory -Force `
                -Path "$awsRoot\.build\x86_64-w64-mingw32\common\src" | Out-Null
              Write-Host "aws workaround: created common/src at $awsRoot"
            } else {
              # Fallback: find any aws 24.x source dir that has a .build subtree
              Get-ChildItem "$env:LOCALAPPDATA\alire\cache\builds" -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -match '^aws_24' } |
                ForEach-Object { Get-ChildItem $_.FullName -Directory -ErrorAction SilentlyContinue } |
                Where-Object { Test-Path "$($_.FullName)\.build" } |
                ForEach-Object {
                  New-Item -ItemType Directory -Force `
                    -Path "$($_.FullName)\.build\x86_64-w64-mingw32\common\src" | Out-Null
                  Write-Host "aws workaround (fallback): created common/src at $($_.FullName)"
                }
            }

            # Retry: Alire re-runs post-fetch; make skips recompilation and
            # awsres can now write to the target directory.
            alr build -- "-XBUILD_PROFILE=${{ inputs.build_profile }}" "-XBUILD_TARGET=x86_64-w64-mingw32"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          strip vericlaw.exe 2>$null
          $LASTEXITCODE = 0
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-windows-x86_64
          path: vericlaw.exe
