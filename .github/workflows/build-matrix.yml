name: Cross-Platform Build

on:
  workflow_call:
    inputs:
      build_profile:
        description: 'Build profile (dev, release)'
        required: false
        default: 'release'
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            triple: x86_64-linux-gnu
          - target: linux-aarch64
            triple: aarch64-linux-gnu
          - target: linux-armv7
            triple: arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsqlite3-dev libcurl4-openssl-dev
          if [ "${{ matrix.triple }}" = "aarch64-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.triple }}" = "arm-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.triple }} ./scripts/embed_version.sh
      - name: Build
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.triple }}
          # Strip debug symbols (keep separate)
          objcopy --only-keep-debug vericlaw vericlaw.debug 2>/dev/null || true
          strip --strip-all vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: |
            vericlaw
            vericlaw.debug

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: macos-aarch64
            arch: arm64
            gpr_target: aarch64-apple-darwin
          - runner: macos-13
            target: macos-x86_64
            arch: x86_64
            gpr_target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: brew install sqlite curl
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.gpr_target }} ./scripts/embed_version.sh
      - name: Build
        env:
          LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib:/opt/homebrew/opt/curl/lib
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.gpr_target }}
          strip vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw

  build-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-aarch64, path: arm64/ }
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-x86_64, path: x86_64/ }
      - name: Create universal binary
        run: |
          lipo -create -output vericlaw arm64/vericlaw x86_64/vericlaw
          file vericlaw  # Should show "Mach-O universal binary"
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-macos-universal
          path: vericlaw

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (curl, sqlite)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-curl
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Generate build info
        shell: bash
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=x86_64-w64-mingw32 ./scripts/embed_version.sh
      - name: Patch aws index for Windows (mkdir common/src fix)
        # aws 24.0.0 post-fetch fails on Windows because awsres tries to write to
        # .build/<target>/common/src which gprbuild -p never creates on Windows.
        # Insert a 'mkdir -p' action into the local Alire index before 'make all'.
        shell: python
        run: |
          import os, sys
          for env_var in ('LOCALAPPDATA', 'APPDATA'):
              base = os.environ.get(env_var, '')
              if not base:
                  continue
              search_root = os.path.join(base, 'alire')
              if not os.path.exists(search_root):
                  continue
              for root, dirs, files in os.walk(search_root):
                  if 'aws-24.0.0.toml' in files:
                      path = os.path.join(root, 'aws-24.0.0.toml')
                      print(f'Found: {path}')
                      with open(path, 'rb') as f:
                          data = f.read()
                      nl = b'\r\n' if b'\r\n' in data else b'\n'
                      old = nl.join([
                          b'[[actions]]',
                          b'type = "post-fetch"',
                          b'command = ["make", "all", "ENABLE_SHARED=false"]',
                      ])
                      new = nl.join([
                          b'[[actions]]',
                          b'type = "post-fetch"',
                          b'command = ["sh", "-c", "T=$(gcc -dumpmachine 2>/dev/null); T=${T:-x86_64-w64-mingw32}; mkdir -p .build/$T/common/src 2>/dev/null || true"]',
                          b'[[actions]]',
                          b'type = "post-fetch"',
                          b'command = ["make", "all", "ENABLE_SHARED=false"]',
                      ])
                      if old not in data:
                          print('Pattern not found; file may be in unexpected format')
                          sys.exit(0)
                      with open(path, 'wb') as f:
                          f.write(data.replace(old, new, 1))
                      print('Patched successfully')
                      sys.exit(0)
          print('aws-24.0.0.toml not found in LOCALAPPDATA/APPDATA alire dirs')
      - name: Build
        shell: bash
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=x86_64-w64-mingw32
          strip vericlaw.exe 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-windows-x86_64
          path: vericlaw.exe
