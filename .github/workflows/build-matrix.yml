name: Cross-Platform Build

on:
  workflow_call:
    inputs:
      build_profile:
        description: 'Build profile (dev, release)'
        required: false
        default: 'release'
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            triple: x86_64-linux-gnu
          - target: linux-aarch64
            triple: aarch64-linux-gnu
          - target: linux-armv7
            triple: arm-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsqlite3-dev libcurl4-openssl-dev
          if [ "${{ matrix.triple }}" = "aarch64-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.triple }}" = "arm-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.triple }} ./scripts/embed_version.sh
      - name: Build
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.triple }}
          # Strip debug symbols (keep separate)
          objcopy --only-keep-debug vericlaw vericlaw.debug 2>/dev/null || true
          strip --strip-all vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: |
            vericlaw
            vericlaw.debug

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: macos-aarch64
            arch: arm64
            gpr_target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Install dependencies
        run: brew install sqlite curl
      - name: Generate build info
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=${{ matrix.gpr_target }} ./scripts/embed_version.sh
      - name: Build
        env:
          LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib:/opt/homebrew/opt/curl/lib
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=${{ matrix.gpr_target }}
          strip vericlaw 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw

  build-macos-universal:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: vericlaw-macos-aarch64, path: arm64/ }
      - uses: actions/download-artifact@v4
        id: dl-x86
        continue-on-error: true
        with: { name: vericlaw-macos-x86_64, path: x86_64/ }
      - name: Create universal binary
        run: |
          if [ -f x86_64/vericlaw ]; then
            chmod +x arm64/vericlaw x86_64/vericlaw
            lipo -create -output vericlaw arm64/vericlaw x86_64/vericlaw
            file vericlaw
          else
            cp arm64/vericlaw vericlaw
            chmod +x vericlaw
            echo "x86_64 unavailable; publishing ARM64 as universal"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-macos-universal
          path: vericlaw

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (curl, sqlite)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-curl
      - uses: alire-project/setup-alire@v4
        with: { version: '2.0.2' }
      - name: Generate build info
        shell: bash
        run: |
          chmod +x scripts/embed_version.sh
          BUILD_TARGET=x86_64-w64-mingw32 ./scripts/embed_version.sh
      - name: Install make shim (aws 24.0.0 Windows workaround)
        # aws 24.0.0: awsres writes template files to .build/<target>/common/src
        # but gprbuild -p never creates that directory on Windows.  Compile a
        # tiny make.exe wrapper that pre-creates the path before delegating to
        # the real make.  Install it at C:\msys64\usr\bin\make.exe (replacing
        # the original, which is backed up as make-orig.exe) so both MSYS2 bash
        # PATH (/usr/bin) and the Windows PATH pick up the wrapper.
        shell: python
        run: |
          import os, subprocess, shutil
          orig = r'C:\msys64\usr\bin\make.exe'
          bak  = r'C:\msys64\usr\bin\make-orig.exe'
          if os.path.exists(orig) and not os.path.exists(bak):
              shutil.copy2(orig, bak)
              print('Backed up', orig, '->', bak)
          sd = os.path.join(os.environ.get('TEMP', 'C:\\Temp'), 'make-shim')
          os.makedirs(sd, exist_ok=True)
          # Write C source for the shim (raw string avoids Python escape confusion)
          c = r"""
          #include <windows.h>
          #include <string.h>
          static void md(const char *p) {
            char b[MAX_PATH]; DWORD i, n = (DWORD)strlen(p);
            for (i = 1; i <= n; i++)
              if (p[i]=='\\' || p[i]=='/' || i==n) {
                strncpy(b, p, i); b[i] = '\0'; CreateDirectoryA(b, NULL);
              }
          }
          int main(int argc, char **argv) {
            int i; char cmd[32768];
            md(".build\\x86_64-w64-mingw32\\common\\src");
            strcpy(cmd, "C:\\msys64\\usr\\bin\\make-orig.exe");
            for (i = 1; i < argc; i++) { strcat(cmd, " "); strcat(cmd, argv[i]); }
            STARTUPINFOA si; ZeroMemory(&si, sizeof(si)); si.cb = sizeof(si);
            PROCESS_INFORMATION pi;
            if (!CreateProcessA(NULL,cmd,NULL,NULL,TRUE,0,NULL,NULL,&si,&pi)) return 1;
            WaitForSingleObject(pi.hProcess, INFINITE);
            DWORD ec; GetExitCodeProcess(pi.hProcess, &ec);
            CloseHandle(pi.hProcess); CloseHandle(pi.hThread);
            return (int)ec;
          }
          """
          src = os.path.join(sd, 'shim.c')
          with open(src, 'w') as f:
              f.write(c)
          exe = os.path.join(sd, 'make.exe')
          if subprocess.call(['gcc', '-o', exe, src, '-static-libgcc']) == 0:
              shutil.copy2(exe, orig)
              print('make shim installed at', orig, '(orig backed up as', bak, ')')
          else:
              print('Warning: make shim compile failed; proceeding without it')
      - name: Build
        id: build-attempt
        continue-on-error: true
        shell: bash
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          alr toolchain --select gnat_native=14.2.1
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=x86_64-w64-mingw32
          strip vericlaw.exe 2>/dev/null || true
      - name: Fix aws 24.0.0 gen-templates
        # aws 24.0.0's tools/wsdl2aws-templates/Makefile has NO mkdir before
        # the awsres call.  The parent Makefile does `mkdir -p $(BDIR)/../common/src`
        # in build-awsres-tool-native, but the `..` path with a non-existent debug/
        # dir fails silently on Windows (mkdir exits 0 but the dir isn't created).
        # Fix: patch the sub-Makefile to add an explicit mkdir using the exact
        # relative path that awsres uses.  This runs in the same shell/CWD as
        # awsres so path resolution is guaranteed to match.
        if: steps.build-attempt.outcome == 'failure'
        shell: python
        run: |
          import os, glob, sys
          la = os.environ.get('LOCALAPPDATA', '')
          print('LOCALAPPDATA:', la)
          aws_dirs = glob.glob(la.replace('\\', '/') + '/alire/cache/builds/aws_24.0.0_2b75fe6d/*/')
          if not aws_dirs:
              aws_dirs = glob.glob(la.replace('\\', '/') + '/alire/cache/builds/aws_*/*/')
          print('aws dirs found:', aws_dirs)
          if not aws_dirs:
              print('ERROR: no aws build directory found - skipping patch')
              sys.exit(0)
          for aws_src_slash in aws_dirs:
              aws_src = aws_src_slash.rstrip('/').replace('/', os.sep)
              print('aws_src:', aws_src)
              mk = os.path.join(aws_src, 'tools', 'wsdl2aws-templates', 'Makefile')
              print('Makefile:', mk, '| exists:', os.path.exists(mk))
              if not os.path.exists(mk):
                  continue
              with open(mk, 'r') as f:
                  content = f.read()
              print('--- Current Makefile ---')
              print(content)
              print('--- End Makefile ---')
              MARKER = 'mkdir -p ../../.build/$(TARGET)/common/src'
              if MARKER in content:
                  print('Makefile already patched')
                  continue
              # Insert mkdir before the awsres invocation line
              OLD = '\t../../$(BDIR)/static/tools/awsres \\\n'
              NEW = '\t' + MARKER + '\n' + OLD
              if OLD in content:
                  patched = content.replace(OLD, NEW, 1)
                  with open(mk, 'w') as f:
                      f.write(patched)
                  print('Makefile patched')
              else:
                  print('WARNING: awsres line not found; raw-patching gen-templates target')
                  patched = content.replace(
                      'gen-templates:\n\t',
                      'gen-templates:\n\t' + MARKER + '\n\t',
                      1)
                  if patched != content:
                      with open(mk, 'w') as f:
                          f.write(patched)
                      print('Raw patch applied')
                  else:
                      print('ERROR: could not patch Makefile')
                      sys.exit(1)
              print('--- Patched Makefile ---')
              with open(mk, 'r') as f:
                  print(f.read())
              print('--- End patched Makefile ---')
      - name: Build (retry after aws directory fix)
        if: steps.build-attempt.outcome == 'failure'
        shell: bash
        env:
          LIBRARY_PATH: C:/msys64/mingw64/lib
          CPATH: C:/msys64/mingw64/include
        run: |
          alr build -- -XBUILD_PROFILE=${{ inputs.build_profile }} -XBUILD_TARGET=x86_64-w64-mingw32
          strip vericlaw.exe 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-windows-x86_64
          path: vericlaw.exe
