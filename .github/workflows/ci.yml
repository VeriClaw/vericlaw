name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ada:
    # Pin to 22.04 for gnatcoll build stability (tested baseline)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Alire
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('alire.toml') }}
          restore-keys: alire-${{ runner.os }}-

      - uses: alire-project/setup-alire@v4

      - name: Install GNAT toolchain
        run: alr toolchain --select gnat_native

      - name: Build Ada
        run: alr build

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('vericlaw-signal/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build Rust (core, no signal feature)
        run: cargo build --release
        working-directory: vericlaw-signal

  prove:
    # Pin to 22.04 — gnatprove apt package availability
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Alire
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('alire.toml') }}
          restore-keys: alire-${{ runner.os }}-

      - uses: alire-project/setup-alire@v4

      - name: Install GNAT toolchain
        run: alr toolchain --select gnat_native

      - name: Install GNATprove
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gnatprove || \
          sudo apt-get install -y --no-install-recommends spark2014

      - name: Run proofs
        run: make prove

  test:
    # Pin to 22.04 for build stability (tested baseline)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Alire
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('alire.toml') }}
          restore-keys: alire-${{ runner.os }}-

      - uses: alire-project/setup-alire@v4

      - name: Install GNAT toolchain
        run: alr toolchain --select gnat_native

      - name: Run tests
        run: make test

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('vericlaw-signal/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Lint Rust
        run: cargo clippy -- -D warnings
        working-directory: vericlaw-signal
