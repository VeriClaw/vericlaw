name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-latest
          - target: linux-aarch64
            os: ubuntu-latest
            cross: true
          - target: macos-arm64
            os: macos-latest
          - target: macos-x86_64
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools (linux-aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - uses: alire-project/setup-alire@v4

      - name: Install GNAT toolchain
        run: alr toolchain --select gnat_native

      - name: Build Ada binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            gprbuild -P vericlaw.gpr -XBUILD_TARGET=aarch64-linux-gnu
          else
            gprbuild -P vericlaw.gpr
          fi

      - name: Build Rust binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo build --release --target aarch64-unknown-linux-gnu
          else
            cargo build --release
          fi
        working-directory: vericlaw-signal

      - name: Package archive
        run: |
          mkdir -p dist/
          # Locate compiled Ada binary (gprbuild puts it at repo root)
          cp vericlaw dist/ 2>/dev/null || cp bin/vericlaw dist/ 2>/dev/null || true
          # Locate compiled Rust binary
          if [ "${{ matrix.cross }}" = "true" ]; then
            cp vericlaw-signal/target/aarch64-unknown-linux-gnu/release/vericlaw-signal dist/
          else
            cp vericlaw-signal/target/release/vericlaw-signal dist/ 2>/dev/null || \
            cp vericlaw-signal/target/x86_64-apple-darwin/release/vericlaw-signal dist/ 2>/dev/null || true
          fi
          cp README.txt dist/
          tar czf vericlaw-${{ matrix.target }}.tar.gz -C dist vericlaw vericlaw-signal README.txt

      - uses: actions/upload-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: vericlaw-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vericlaw-*
          path: dist/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist/
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
