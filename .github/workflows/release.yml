name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # For creating releases
  packages: write  # For pushing to GHCR

env:
  ALIRE_VERSION: '2.0.2'
  GNAT_VERSION: 'gnat_native=14.2.1'

jobs:
  # Reuse the cross-platform build matrix
  build:
    uses: ./.github/workflows/build-matrix.yml
    with:
      build_profile: release

  # Package and publish
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release/
          
          # Linux x86_64
          cd artifacts/vericlaw-linux-x86_64
          chmod +x vericlaw
          tar czf ../../release/vericlaw-v${VERSION}-linux-x86_64.tar.gz vericlaw
          cd ../..
          
          # Linux aarch64
          if [ -d artifacts/vericlaw-linux-aarch64 ]; then
            cd artifacts/vericlaw-linux-aarch64
            chmod +x vericlaw
            tar czf ../../release/vericlaw-v${VERSION}-linux-aarch64.tar.gz vericlaw
            cd ../..
          fi
          
          # Linux ARMv7 (Raspberry Pi)
          if [ -d artifacts/vericlaw-linux-armv7 ]; then
            cd artifacts/vericlaw-linux-armv7
            chmod +x vericlaw
            tar czf ../../release/vericlaw-v${VERSION}-linux-armv7.tar.gz vericlaw
            cd ../..
          fi
          
          # macOS universal
          if [ -d artifacts/vericlaw-macos-universal ]; then
            cd artifacts/vericlaw-macos-universal
            chmod +x vericlaw
            tar czf ../../release/vericlaw-v${VERSION}-macos-universal.tar.gz vericlaw
            cd ../..
          fi
          
          # macOS individual (if universal not available)
          for arch in aarch64 x86_64; do
            if [ -d "artifacts/vericlaw-macos-${arch}" ]; then
              cd "artifacts/vericlaw-macos-${arch}"
              chmod +x vericlaw
              tar czf "../../release/vericlaw-v${VERSION}-macos-${arch}.tar.gz" vericlaw
              cd ../..
            fi
          done
          
          # Windows
          if [ -d artifacts/vericlaw-windows-x86_64 ]; then
            cd artifacts/vericlaw-windows-x86_64
            zip -q ../../release/vericlaw-v${VERSION}-windows-x86_64.zip vericlaw.exe
            cd ../..
          fi

      - name: Generate checksums
        run: |
          cd release/
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: GPG sign checksums
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cd release/
          gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback \
            --detach-sign --armor checksums-sha256.txt

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]|^## \[v${VERSION}\]|^### Added.*${VERSION}|^### Fixed.*${VERSION}/{found=1} found && /^## \[/{if(++count>1)exit} found" \
            CHANGELOG.md > release-notes.md 2>/dev/null || echo "Release ${GITHUB_REF_NAME}" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build .deb and .rpm packages
  build-packages:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            target: linux-x86_64
          - arch: arm64
            target: linux-aarch64
          - arch: armhf
            target: linux-armv7
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: vericlaw-${{ matrix.target }}
          path: .

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -qq
          sudo apt-get install -y nfpm

      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${VERSION#v}"
          chmod +x vericlaw

          # Build .deb
          VERSION="${VERSION}" GOARCH="${{ matrix.arch }}" nfpm package \
            --config packaging/nfpm.yaml \
            --packager deb \
            --target "vericlaw_${VERSION}_${{ matrix.arch }}.deb"

          # Build .rpm
          VERSION="${VERSION}" GOARCH="${{ matrix.arch }}" nfpm package \
            --config packaging/nfpm.yaml \
            --packager rpm \
            --target "vericlaw-${VERSION}-1.${{ matrix.arch }}.rpm"

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update Homebrew tap
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta')"
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/checksums-sha256.txt" \
            -o checksums.txt
          cat checksums.txt

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract SHA-256 hashes from checksums file
          SHA_MACOS=$(grep 'macos-universal' checksums.txt | cut -d' ' -f1)
          SHA_LINUX_X86=$(grep 'linux-x86_64' checksums.txt | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(grep 'linux-aarch64' checksums.txt | cut -d' ' -f1)

          # Clone tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vericlaw/homebrew-vericlaw.git" tap
          
          # Copy and update formula
          cp packaging/homebrew/vericlaw.rb tap/Formula/vericlaw.rb
          cd tap/Formula
          
          sed -i "s/version \".*\"/version \"${VERSION}\"/" vericlaw.rb
          sed -i "s/PLACEHOLDER_SHA256_MACOS_ARM64/${SHA_MACOS}/" vericlaw.rb
          sed -i "s/PLACEHOLDER_SHA256_MACOS_X86_64/${SHA_MACOS}/" vericlaw.rb
          sed -i "s/PLACEHOLDER_SHA256_LINUX_X86_64/${SHA_LINUX_X86}/" vericlaw.rb
          sed -i "s/PLACEHOLDER_SHA256_LINUX_AARCH64/${SHA_LINUX_ARM64}/" vericlaw.rb
          
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vericlaw.rb
          git commit -m "Update vericlaw to ${VERSION}" || echo "No changes"
          git push

  # Update Scoop bucket
  update-scoop:
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta')"
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/checksums-sha256.txt" \
            -o checksums.txt

      - name: Update Scoop manifest
        env:
          BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WIN=$(grep 'windows-x86_64' checksums.txt | cut -d' ' -f1)

          # Clone bucket repo
          git clone "https://x-access-token:${BUCKET_TOKEN}@github.com/vericlaw/scoop-vericlaw.git" bucket

          # Update manifest from template
          cp packaging/scoop/vericlaw.json bucket/bucket/vericlaw.json
          cd bucket/bucket

          # Replace version and hash
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" vericlaw.json
          sed -i "s|v1.0.0|v${VERSION}|g" vericlaw.json
          sed -i "s/PLACEHOLDER_SHA256/${SHA_WIN}/" vericlaw.json

          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/vericlaw.json
          git commit -m "Update vericlaw to ${VERSION}" || echo "No changes"
          git push

  # Build and push multi-arch Docker image to GHCR
  publish-docker:
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta')"
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vericlaw-linux-*
          path: artifacts/
          merge-multiple: false

      - name: Prepare Docker build context
        run: |
          mkdir -p docker-context/bin/{amd64,arm64,armv7}
          cp artifacts/vericlaw-linux-x86_64/vericlaw  docker-context/bin/amd64/vericlaw
          cp artifacts/vericlaw-linux-aarch64/vericlaw docker-context/bin/arm64/vericlaw
          cp artifacts/vericlaw-linux-armv7/vericlaw   docker-context/bin/armv7/vericlaw
          chmod +x docker-context/bin/*/vericlaw
          cp Dockerfile.runtime docker-context/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker-context/
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

  # Submit updated winget manifest to microsoft/winget-pkgs
  update-winget:
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta')"
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/checksums-sha256.txt" \
            -o checksums.txt

      - name: Submit winget PR
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WIN=$(grep 'windows-x86_64' checksums.txt | cut -d' ' -f1)
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vericlaw-v${VERSION}-windows-x86_64.zip"

          # Update manifest templates
          cp packaging/winget/VeriClaw.VeriClaw.installer.yaml installer.yaml
          sed -i "s/PackageVersion: .*/PackageVersion: ${VERSION}/" installer.yaml
          sed -i "s|releases/download/v[0-9.]*/vericlaw-v[0-9.]*-windows|releases/download/v${VERSION}/vericlaw-v${VERSION}-windows|g" installer.yaml
          sed -i "s/InstallerSha256: .*/InstallerSha256: ${SHA_WIN}/" installer.yaml

          # Use winget-releaser action pattern: create PR via GitHub API
          # Requires WINGET_TOKEN secret (PAT with fork + PR access to microsoft/winget-pkgs)
          if [ -z "${WINGET_TOKEN:-}" ]; then
            echo "⚠ WINGET_TOKEN not set — skipping winget submission. Set the secret to enable automated winget updates."
            exit 0
          fi

          # Install winget-create (Linux binary via .NET)
          curl -fsSL https://aka.ms/wingetcreate/latest/linux -o wingetcreate
          chmod +x wingetcreate
          ./wingetcreate update VeriClaw.VeriClaw \
            --version "${VERSION}" \
            --urls "${URL}" \
            --token "${WINGET_TOKEN}" \
            --submit
