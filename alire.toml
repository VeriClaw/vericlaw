name = "vericlaw"
description = "Ada/SPARK AI agent runtime with formally verified security core"
version = "1.0.0"
authors = ["VeriClaw Team"]
licenses = "MIT"
website = "https://github.com/vericlaw"

[[depends-on]]
gnatcoll = "^24.0.0"
aws = "^24.0.0"

[gpr-externals]
BUILD_PROFILE = ["dev", "release", "small", "edge-size", "edge-speed", "coverage"]
BUILD_TARGET = ["native", "x86_64-linux-gnu", "aarch64-linux-gnu", "arm-linux-gnueabihf", "x86_64-w64-mingw32"]
BINDER_MODE = ["portable", "minimal"]

[gpr-set-externals]
BUILD_PROFILE = "dev"
BUILD_TARGET = "native"
