version = 1
scope = "runtime-hardening-first"
matrix_path = "config/borrow_matrix_scintilla_vortex.csv"

[fail_closed_defaults]
require_pairing_default = true
allow_public_bind_default = false
empty_allowlist_denies_all = true
workspace_scope_default = true
deny_private_and_local_egress = true
encrypt_secrets_at_rest = true
allow_wildcard_sender_match = false

[[acceptance_checks]]
id = "AC-SV-CRYPTO-ATREST"
area = "crypto"
source_refs = [
  "scintilla/src/scintilla-crypto.ads",
  "scintilla/src/scintilla-crypto.adb",
  "scintilla/src/scintilla-auth.adb"
]
quasar_targets = [
  "src/security-secrets.ads",
  "src/security-secrets.adb",
  "src/security-secrets-crypto.ads",
  "src/security-secrets-crypto.adb",
  "tests/security_secrets_tests.adb",
  "tests/security-crypto-runtime-decision-vectors.csv"
]
verification = [
  "./scripts/run_container_ci.sh secrets-test"
]
required_results = [
  "Secret ingest/store rejects Encrypted_At_Rest = False with Storage_Not_Encrypted.",
  "Missing key source or key material never returns a success result.",
  "Audit metadata must be redacted before being accepted."
]
fail_closed_expectation = "If encryption/key-source preconditions are ambiguous or missing, deny ingestion/storage."

[[acceptance_checks]]
id = "AC-SV-CRYPTO-CT"
area = "crypto"
source_refs = [
  "vortex-shrimp/src/vortex_shrimp-security-constant_time.adb",
  "scintilla/src/scintilla-crypto.adb"
]
quasar_targets = [
  "src/gateway-auth.adb",
  "src/gateway-provider-credentials.adb"
]
verification = [
  "./scripts/run_container_ci.sh check"
]
required_results = [
  "Token comparison uses constant-time behavior for equal and unequal lengths.",
  "Token mismatch cannot resolve to Allow in authentication decisions."
]
fail_closed_expectation = "Comparison errors or malformed token input must resolve to deny."

[[acceptance_checks]]
id = "AC-SV-PAIRING-LOCKOUT"
area = "pairing"
source_refs = [
  "scintilla/src/scintilla-auth.adb",
  "vortex-shrimp/src/vortex_shrimp-gateway.adb"
]
quasar_targets = [
  "src/gateway-auth.ads",
  "src/gateway-auth.adb",
  "tests/gateway_auth_policy.adb"
]
verification = [
  "./scripts/run_container_ci.sh check"
]
required_results = [
  "Require_Pairing=true with Unpaired state returns Deny_Not_Paired.",
  "Missing/invalid token paths deny before any allow result.",
  "Pairing retries above policy threshold trigger lockout deny behavior."
]
fail_closed_expectation = "Any unknown pairing state or token validation failure must deny access."

[[acceptance_checks]]
id = "AC-SV-PAIRING-BIND"
area = "pairing"
source_refs = [
  "vortex-shrimp/src/vortex_shrimp-config.adb",
  "vortex-shrimp/src/vortex_shrimp-gateway.adb"
]
quasar_targets = [
  "src/security-defaults.ads",
  "src/gateway-auth.adb"
]
verification = [
  "./scripts/run_container_ci.sh check"
]
required_results = [
  "Default bind host remains loopback and public bind stays opt-in.",
  "Insecure public bind without pairing is denied as configuration error."
]
fail_closed_expectation = "When bind safety cannot be proven, runtime startup must refuse configuration."

[[acceptance_checks]]
id = "AC-SV-PATH-WORKSPACE"
area = "path"
source_refs = [
  "vortex-shrimp/src/vortex_shrimp-security-path_policy.adb",
  "scintilla/src/scintilla-security.adb"
]
quasar_targets = [
  "src/security-policy.ads",
  "src/security-policy.adb",
  "tests/security-policy-decision-vectors.csv"
]
verification = [
  "./scripts/run_container_ci.sh check"
]
required_results = [
  "Traversal markers (.., /../, NUL) are denied.",
  "Workspace-restricted mode denies non-subpaths.",
  "Absolute paths outside workspace are denied unless explicitly allowlisted."
]
fail_closed_expectation = "Path parse or normalization ambiguity defaults to deny."

[[acceptance_checks]]
id = "AC-SV-URL-EGRESS"
area = "url"
source_refs = [
  "scintilla/src/scintilla-security.adb",
  "vortex-shrimp/src/vortex_shrimp-util.adb"
]
quasar_targets = [
  "src/security-policy.ads",
  "src/security-policy.adb",
  "tests/security-policy-decision-vectors.csv"
]
verification = [
  "./scripts/run_container_ci.sh check"
]
required_results = [
  "Egress disabled state returns Egress_Deny_Disabled.",
  "Private/local targets return Egress_Deny_Private_Network or Egress_Deny_Local_Network.",
  "Only explicit safe public targets can resolve to Egress_Allow."
]
fail_closed_expectation = "Unknown host/network classification denies outbound access."

[[acceptance_checks]]
id = "AC-SV-ALLOWLIST-EMPTY"
area = "allowlist"
source_refs = [
  "vortex-shrimp/src/vortex_shrimp-security-allowlist.adb",
  "vortex-shrimp/docs/threat-model.md"
]
quasar_targets = [
  "src/channels-security.ads",
  "src/channels-security.adb",
  "tests/channel_security_policy.adb"
]
verification = [
  "./scripts/run_container_ci.sh conformance-suite"
]
required_results = [
  "Allowlist_Size = 0 always returns deny across channel kinds.",
  "Sender mismatch returns deny and cannot fall through to allow.",
  "Decision vectors remain deny-first for empty allowlists."
]
fail_closed_expectation = "Empty, malformed, or missing allowlist input must deny sender access."

[[acceptance_checks]]
id = "AC-SV-ALLOWLIST-WIRING"
area = "allowlist"
source_refs = [
  "vortex-shrimp/src/vortex_shrimp-security-allowlist.adb",
  "vortex-shrimp/src/vortex_shrimp-selftest.adb"
]
quasar_targets = [
  "src/channels-adapters.adb",
  "tests/channel_adapter_policy.adb"
]
verification = [
  "./scripts/run_container_ci.sh conformance-suite"
]
required_results = [
  "Adapter inbound/outbound decisions propagate allowlist deny states.",
  "Wildcard '*' sender semantics are not introduced in quasar runtime wiring.",
  "Channel-disabled state remains deny even when sender would otherwise match."
]
fail_closed_expectation = "Any unresolved channel/sender authorization state defaults to deny."
