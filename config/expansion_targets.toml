version = 1
matrix_path = "config/feature_gap_matrix.csv"

[security_invariants]
deny_by_default = true
empty_allowlist_denies_all = true
require_pairing_and_token = true
allow_public_bind_default = false
workspace_scope_required = true
block_private_and_local_egress = true
encrypt_secrets_at_rest = true
audit_with_redaction = true

[baseline_references]
quasar_defaults = [
  "src/security-defaults.ads",
  "src/gateway-auth.ads",
  "src/channels-security.ads",
  "src/security-policy.ads",
  "src/security-secrets.ads"
]

[phase1]
focus = "provider_then_channel"

[[phase1.providers]]
id = "ollama-local"
decision = "target"
priority = "P0"
source_refs = [
  "nullclaw/src/providers/factory.zig",
  "picoclaw/pkg/providers/factory.go"
]
gates = [
  "provider disabled by default",
  "explicit provider allowlist",
  "no external egress requirement"
]

[[phase1.providers]]
id = "openai-compatible-single-endpoint"
decision = "target"
priority = "P0"
source_refs = [
  "zeroclaw/src/providers/mod.rs",
  "openclaw/src/infra/net/ssrf.ts",
  "openclaw/src/infra/net/fetch-guard.ts"
]
gates = [
  "explicit hostname allowlist",
  "private and local network deny",
  "encrypted API key storage"
]

[[phase1.providers]]
id = "anthropic-direct"
decision = "target"
priority = "P1"
source_refs = [
  "zeroclaw/src/providers/anthropic.rs",
  "ironclaw/src/secrets/crypto.rs"
]
gates = [
  "pairing and token auth already enabled",
  "encrypted secret store",
  "audit auth failures"
]

[[phase1.providers]]
id = "oauth-heavy-providers"
decision = "defer"
priority = "P2"
source_refs = [
  "picoclaw/pkg/auth/oauth.go",
  "nanobot/nanobot/providers/openai_codex_provider.py"
]
gates = [
  "device-bound refresh-token storage",
  "token revocation and rotation workflow",
  "audit trail for token issuance"
]

[[phase1.channels]]
id = "slack-socket"
decision = "target"
priority = "P0"
source_refs = [
  "openclaw/src/channels/registry.ts",
  "picoclaw/pkg/channels/slack.go",
  "nanobot/nanobot/channels/slack.py"
]
gates = [
  "channel disabled by default",
  "non-empty allowlist required",
  "pairing token required before message handling",
  "rate-limit and replay guard"
]

[[phase1.channels]]
id = "telegram-bot-api"
decision = "target"
priority = "P0"
source_refs = [
  "zeroclaw/src/channels/telegram.rs",
  "picoclaw/pkg/channels/telegram.go",
  "nanobot/nanobot/channels/telegram.py"
]
gates = [
  "channel allowlist required",
  "pairing required for first sender",
  "media fetch restricted to allowlisted hosts"
]

[[phase1.channels]]
id = "public-webhook-expansion"
decision = "defer"
priority = "P1"
source_refs = [
  "ironclaw/src/channels/http.rs",
  "openclaw/src/infra/net/fetch-guard.ts"
]
gates = [
  "idempotency key enforcement",
  "strict shared-secret verification",
  "SSRF-guarded callback fetches",
  "public bind remains explicit opt-in"
]

[phase1.execution_order]
providers = ["ollama-local", "openai-compatible-single-endpoint", "anthropic-direct"]
channels = ["slack-socket", "telegram-bot-api"]
