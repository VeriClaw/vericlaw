# VeriClaw + WhatsApp Bridge + Discord Bridge + Slack Bridge + Email Bridge
#
# Quick start (headless pairing):
#   1. cp config/whatsapp.example.json config/config.json  # fill in your API key
#   2. WA_PHONE=+1234567890 docker compose up wa-bridge    # get pairing code
#   3. Enter the code in WhatsApp -> Settings -> Linked Devices -> Link with phone number
#   4. docker compose up                                   # start full stack
#
# For Discord: set DISCORD_BOT_TOKEN env var and run:
#   docker compose up discord-bridge vericlaw
#
# For Slack: set SLACK_BOT_TOKEN and SLACK_APP_TOKEN env vars and run:
#   docker compose up slack-bridge vericlaw
#
# For Email: set EMAIL_USER and EMAIL_PASS env vars and run:
#   docker compose up email-bridge vericlaw
#
# See docs/setup/whatsapp.md, docs/setup/discord.md, docs/setup/slack.md,
# and docs/setup/email.md for details.

services:
  discord-bridge:
    build:
      context: ./discord-bridge
      dockerfile: Dockerfile
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
    ports:
      - "3002:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  wa-bridge:
    build:
      context: ./wa-bridge
      dockerfile: Dockerfile
    environment:
      - WA_PHONE=${WA_PHONE:-}           # set to +1234567890 for headless pairing
      - WA_SESSION=vericlaw
      - SESSIONS_DIR=/app/sessions
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - wa-sessions:/app/sessions        # persists WhatsApp auth across restarts
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  slack-bridge:
    build:
      context: ./slack-bridge
      dockerfile: Dockerfile
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  email-bridge:
    build:
      context: ./email-bridge
      dockerfile: Dockerfile
    environment:
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
      - IMAP_HOST=${IMAP_HOST:-imap.gmail.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
    ports:
      - "3003:3003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  vericlaw:
    build:
      context: .
      dockerfile: Dockerfile.release
    platform: linux/amd64
    command: ["gateway"]
    environment:
      - HOME=/tmp
    volumes:
      - ./config:/tmp/.vericlaw:ro       # mount your config.json here
    depends_on:
      wa-bridge:
        condition: service_healthy
    restart: unless-stopped

  mcp-bridge:
    build:
      context: ./mcp-bridge
      dockerfile: Dockerfile
    profiles:
      - mcp
    environment:
      - MCP_SERVERS=${MCP_SERVERS:-[]}   # JSON array of MCP server configs
      - PORT=3004
    ports:
      - "3004:3004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  wa-sessions:
    driver: local
