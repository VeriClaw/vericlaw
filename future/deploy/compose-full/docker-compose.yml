# VeriClaw + WhatsApp Bridge + Discord Bridge + Slack Bridge + Email Bridge + IRC Bridge + Matrix Bridge + Browser Bridge
#
# Quick start (headless pairing):
#   1. cp config/whatsapp.example.json config/config.json  # fill in your API key
#   2. WA_PHONE=+1234567890 docker compose up wa-bridge    # get pairing code
#   3. Enter the code in WhatsApp -> Settings -> Linked Devices -> Link with phone number
#   4. docker compose up                                   # start full stack
#
# For Discord: set DISCORD_BOT_TOKEN env var and run:
#   docker compose up discord-bridge vericlaw
#
# For Slack: set SLACK_BOT_TOKEN and SLACK_APP_TOKEN env vars and run:
#   docker compose up slack-bridge vericlaw
#
# For Email: set EMAIL_USER and EMAIL_PASS env vars and run:
#   docker compose up email-bridge vericlaw
#
# For IRC: set IRC_HOST, IRC_NICK, IRC_CHANNELS env vars and run:
#   docker compose up irc-bridge vericlaw
#
# For Matrix: set MATRIX_HOMESERVER, MATRIX_TOKEN, MATRIX_USER_ID env vars and run:
#   docker compose up matrix-bridge vericlaw
#
# For Mattermost: set MATTERMOST_URL and MATTERMOST_TOKEN env vars and run:
#   docker compose up mattermost-bridge vericlaw
#
# For Browser tool: run:
#   docker compose up browser-bridge vericlaw
#
# See docs/setup/whatsapp.md, docs/setup/discord.md, docs/setup/slack.md,
# docs/setup/email.md, docs/setup/irc.md, docs/setup/matrix.md,
# docs/setup/mattermost.md, and docs/setup/browser.md for details.

services:
  discord-bridge:
    build:
      context: .
      dockerfile: discord-bridge/Dockerfile
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:?DISCORD_BOT_TOKEN is required}
    ports:
      - "3002:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  wa-bridge:
    build:
      context: ./wa-bridge
      dockerfile: Dockerfile
    environment:
      - WA_PHONE=${WA_PHONE:-}           # set to +1234567890 for headless pairing
      - WA_SESSION=vericlaw
      - SESSIONS_DIR=/app/sessions
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - wa-sessions:/app/sessions        # persists WhatsApp auth across restarts
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  slack-bridge:
    build:
      context: .
      dockerfile: slack-bridge/Dockerfile
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:?SLACK_BOT_TOKEN is required}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:?SLACK_APP_TOKEN is required}
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  email-bridge:
    build:
      context: .
      dockerfile: email-bridge/Dockerfile
    environment:
      - EMAIL_USER=${EMAIL_USER:?EMAIL_USER is required}
      - EMAIL_PASS=${EMAIL_PASS:?EMAIL_PASS is required}
      - IMAP_HOST=${IMAP_HOST:-imap.gmail.com}
      - IMAP_PORT=${IMAP_PORT:-993}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
    ports:
      - "3003:3003"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  irc-bridge:
    build:
      context: .
      dockerfile: irc-bridge/Dockerfile
    environment:
      - IRC_HOST=${IRC_HOST:-irc.libera.chat}
      - IRC_PORT=${IRC_PORT:-6697}
      - IRC_TLS=${IRC_TLS:-true}
      - IRC_NICK=${IRC_NICK:-vericlaw}
      - IRC_PASS=${IRC_PASS:?IRC_PASS is required}
      - IRC_CHANNELS=${IRC_CHANNELS:-#general}
    ports:
      - "3005:3005"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  matrix-bridge:
    build:
      context: .
      dockerfile: matrix-bridge/Dockerfile
    environment:
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-https://matrix.org}
      - MATRIX_TOKEN=${MATRIX_TOKEN:?MATRIX_TOKEN is required}
      - MATRIX_USER_ID=${MATRIX_USER_ID:?MATRIX_USER_ID is required}
    ports:
      - "3006:3006"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/ready',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mattermost-bridge:
    image: ghcr.io/vericlaw/mattermost-bridge:latest
    ports:
      - "3008:3008"
    environment:
      - MATTERMOST_URL=${MATTERMOST_URL}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN}
      - MATTERMOST_TEAM=${MATTERMOST_TEAM:-}
      - MATTERMOST_CHANNEL=${MATTERMOST_CHANNEL:-town-square}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped

  vericlaw:
    build:
      context: .
      dockerfile: Dockerfile.release
    platform: linux/amd64
    command: ["gateway"]
    environment:
      - HOME=/tmp
    volumes:
      - ./config:/tmp/.vericlaw:ro       # mount your config.json here
    depends_on:
      wa-bridge:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp-bridge:
    build:
      context: ./mcp-bridge
      dockerfile: Dockerfile
    profiles:
      - mcp
    environment:
      - MCP_SERVERS=${MCP_SERVERS:-[]}   # JSON array of MCP server configs
      - PORT=3004
    ports:
      - "3004:3004"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  browser-bridge:
    build: ./browser-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:3007:3007"
    environment:
      PORT: "3007"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # required for Chromium sandbox

volumes:
  wa-sessions:
    driver: local
