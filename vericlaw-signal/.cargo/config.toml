# Cross-compilation configuration for vericlaw-signal
#
# Targets for the v1.0-minimal release:
#   linux-x86_64    → x86_64-unknown-linux-musl  (static, no glibc dependency)
#   linux-aarch64   → aarch64-unknown-linux-musl  (static, Pi 4 compatible)
#   macos-arm64     → aarch64-apple-darwin
#   macos-x86_64    → x86_64-apple-darwin
#
# To add musl targets on a Debian/Ubuntu build host:
#   rustup target add x86_64-unknown-linux-musl aarch64-unknown-linux-musl
#   apt-get install musl-tools gcc-aarch64-linux-gnu
#
# To cross-compile:
#   cargo build --release --target x86_64-unknown-linux-musl
#   cargo build --release --target aarch64-unknown-linux-musl

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-musl]
# musl-gcc is provided by the musl-tools package
linker = "musl-gcc"
